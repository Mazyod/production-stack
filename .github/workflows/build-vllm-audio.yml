name: Build and Push vLLM-OpenAI (audio) Image

on:
  schedule:
    # Mondays, 30 min after the router build so they don't contend for runners.
    - cron: "30 6 * * 1"

  workflow_dispatch:
    inputs:
      vllm_tag:
        description: "Force a specific vllm/vllm-openai base tag (e.g. v0.10.0, nightly)"
        required: false
        default: ""
      publish_tags:
        description: "Tags to publish under, space/comma-separated (default: the base tag). Does not move :latest."
        required: false
        default: ""

  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.audio"
      - ".github/workflows/build-vllm-audio.yml"

env:
  IMAGE_NAME: docker.io/openimage/vllm-openai-audio

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Resolve the upstream vLLM release and decide whether to build
  # ---------------------------------------------------------------------------
  check-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      vllm_tag: ${{ steps.resolve.outputs.vllm_tag }}
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      promote_latest: ${{ steps.resolve.outputs.promote_latest }}
      primary_tag: ${{ steps.resolve.outputs.primary_tag }}
      image_refs: ${{ steps.resolve.outputs.image_refs }}
    steps:
      - name: Resolve upstream vLLM tag
        id: resolve
        env:
          # Authenticate GitHub API calls: unauthenticated requests are capped at
          # 60/hr per runner IP (shared across Actions), which intermittently 403s
          # and makes `curl -sf` exit 22. The built-in token lifts this to 5000/hr.
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TRIGGER="${{ github.event_name }}"
          INPUT_TAG="${{ github.event.inputs.vllm_tag }}"
          INPUT_PUBLISH_TAGS="${{ github.event.inputs.publish_tags }}"

          if [[ "$TRIGGER" == "workflow_dispatch" && -n "$INPUT_TAG" ]]; then
            echo "Using manually supplied tag: $INPUT_TAG"
            VLLM_TAG="$INPUT_TAG"
          else
            # Latest vLLM release; the vllm/vllm-openai docker tag matches it.
            VLLM_TAG=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --retry 3 --retry-delay 2 \
              "https://api.github.com/repos/vllm-project/vllm/releases/latest" \
              | jq -r '.tag_name // empty')

            if [[ -z "$VLLM_TAG" ]]; then
              echo "::error::Could not resolve the latest vLLM release tag"
              exit 1
            fi
            echo "Latest vLLM release: $VLLM_TAG"
          fi

          # The base image must actually exist on Docker Hub for this tag,
          # otherwise the build would fail with a confusing pull error.
          BASE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/vllm/vllm-openai/tags/${VLLM_TAG}")
          if [[ "$BASE_CODE" != "200" ]]; then
            echo "::error::Base image vllm/vllm-openai:${VLLM_TAG} not found on Docker Hub (HTTP $BASE_CODE)"
            exit 1
          fi

          # Strip leading v: v0.10.0 -> 0.10.0
          VERSION="${VLLM_TAG#v}"
          echo "Version: $VERSION"

          if [[ "$TRIGGER" == "push" || ("$TRIGGER" == "workflow_dispatch" && -n "$INPUT_TAG") ]]; then
            SHOULD_BUILD="true"
          else
            # Scheduled: skip if we already published this version.
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://hub.docker.com/v2/repositories/openimage/vllm-openai-audio/tags/${VLLM_TAG}")

            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Image ${VLLM_TAG} already exists — skipping."
              SHOULD_BUILD="false"
            else
              echo "Image ${VLLM_TAG} not found — will build."
              SHOULD_BUILD="true"
            fi
          fi

          # Only auto-resolved latest-release builds move the :latest tag. A
          # forced-tag dispatch (e.g. vllm_tag=nightly or an older release) is a
          # one-off and must NOT clobber :latest.
          if [[ "$TRIGGER" == "workflow_dispatch" && -n "$INPUT_TAG" ]]; then
            PROMOTE_LATEST="false"
          else
            PROMOTE_LATEST="true"
          fi

          # Published tags default to the base tag; a dispatch may override them
          # (e.g. publish one nightly build under both `nightly` and a dated
          # snapshot). The primary tag drives the pull/test/latest steps.
          if [[ "$TRIGGER" == "workflow_dispatch" && -n "$INPUT_PUBLISH_TAGS" ]]; then
            PUBLISH_TAGS=$(echo "$INPUT_PUBLISH_TAGS" | tr ',' ' ' | xargs)
          else
            PUBLISH_TAGS="$VLLM_TAG"
          fi
          PRIMARY_TAG="${PUBLISH_TAGS%% *}"

          echo "vllm_tag=$VLLM_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "promote_latest=$PROMOTE_LATEST" >> "$GITHUB_OUTPUT"
          echo "primary_tag=$PRIMARY_TAG" >> "$GITHUB_OUTPUT"

          # Multi-line output: one fully-qualified image ref per published tag,
          # consumed directly by docker/build-push-action's `tags:` field.
          {
            echo "image_refs<<__IMAGE_REFS__"
            for t in $PUBLISH_TAGS; do
              echo "${IMAGE_NAME}:${t}"
            done
            echo "__IMAGE_REFS__"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "========================================"
          echo "  vLLM base tag  : $VLLM_TAG"
          echo "  Version        : $VERSION"
          echo "  Should build   : $SHOULD_BUILD"
          echo "  Promote latest : $PROMOTE_LATEST"
          echo "  Publish tags   : $PUBLISH_TAGS"
          echo "========================================"

  # ---------------------------------------------------------------------------
  # Job 2: Build the audio-enabled image and push
  # ---------------------------------------------------------------------------
  build-and-push:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.audio
          # vllm/vllm-openai is published for linux/amd64 only.
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_TAG=${{ needs.check-upstream.outputs.vllm_tag }}
          tags: ${{ needs.check-upstream.outputs.image_refs }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Base image:** \`vllm/vllm-openai:${{ needs.check-upstream.outputs.vllm_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:**" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r ref; do
            [[ -n "$ref" ]] && echo "  - \`$ref\`" >> "$GITHUB_STEP_SUMMARY"
          done <<< "${{ needs.check-upstream.outputs.image_refs }}"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 3: Verify the audio deps actually import (CPU-only, no GPU needed)
  # ---------------------------------------------------------------------------
  test:
    needs: [check-upstream, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull the built image
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.primary_tag }}"
          echo "Pulling $IMAGE ..."
          docker pull "$IMAGE"

      - name: Assert audio decode deps are present
        run: |
          # The whole point of this image: /v1/audio/transcriptions needs these.
          # vLLM's audio path (vllm/multimodal/media/audio.py) guards `import av`
          # and `import soundfile`; if either is missing it degrades to a
          # PlaceholderModule and raises "install vllm[audio]". Importing both is
          # pure CPU work — no model load, no GPU. (The base image ships
          # `python3`, not a bare `python`.)
          IMAGE="${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.primary_tag }}"
          docker run --rm --entrypoint python3 "$IMAGE" -c \
            "import av, soundfile; print('audio deps OK: av', av.__version__, '| soundfile', soundfile.__version__)"

  # ---------------------------------------------------------------------------
  # Job 4: Tag as :latest after the import check passes
  # ---------------------------------------------------------------------------
  tag-latest:
    needs: [check-upstream, build-and-push, test]
    if: needs.check-upstream.outputs.promote_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag image as latest
        run: |
          SOURCE="${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.primary_tag }}"
          TARGET="${{ env.IMAGE_NAME }}:latest"
          echo "Tagging $SOURCE as $TARGET ..."
          docker buildx imagetools create --tag "$TARGET" "$SOURCE"

      - name: Summary
        run: |
          echo "### Release Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.primary_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
